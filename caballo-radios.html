<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Caballo / Piso Blanco-Negro</title>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#202020;color:#eee}.app{display:grid;grid-template-rows:auto 1fr;height:100vh}.header-panel{display:flex;gap:20px;padding:12px 16px;border-bottom:1px solid #444;align-items:flex-start;overflow-x:auto}.header-section{flex-shrink:0;display:flex;flex-direction:column;gap:8px}.header-section h4{margin:0;font-size:12px;color:#999}.header-section-content{display:flex;gap:8px;align-items:center}.piece-small{font-size:18px;width:28px;height:28px;display:flex;justify-content:center;align-items:center;border:1px solid #666}.rotation-buttons{display:flex;gap:4px}.rotation-buttons button{padding:4px 8px;font-size:12px;width:auto}.radius-controls{display:grid;grid-template-columns:repeat(3,max-content);gap:4px 10px;font-size:11px;line-height:1.2}.radius-controls label{white-space:nowrap;color:#ddd}.radius-controls input{width:auto;margin:0 4px 0 0;vertical-align:middle}.radiusTarget{box-shadow:inset 0 0 0 2px #a855f7}.content-area{display:grid;grid-template-columns:1fr 100px 100px;gap:1px;background:#444;overflow:hidden}.board-container{display:flex;justify-content:center;align-items:center;overflow:auto;background:#202020}.board{display:grid;grid-template-columns:repeat(100,20px);grid-template-rows:repeat(100,20px);border:3px solid #aaa}.cell{display:flex;justify-content:center;align-items:center;font-size:calc(var(--cell-size,20px)*.6);cursor:pointer;user-select:none;position:relative}.white{background:#e8e8e8;color:#111}.black{background:#444;color:#fff}.selected{outline:4px solid yellow;z-index:2}.knightTarget{box-shadow:inset 0 0 0 2px #ff5f5f}.coord{position:absolute;bottom:3px;right:5px;font-size:10px;opacity:.55}.side-panel{padding:12px;box-sizing:border-box;background:#202020;overflow-y:auto;font-size:12px}.side-panel h3{margin:0 0 8px;font-size:12px;color:#999}.side-panel label{display:block;margin-top:8px;font-size:11px}input,textarea{width:100%;box-sizing:border-box;margin:4px 0 8px;padding:4px;background:#111;color:#eee;border:1px solid #555;font-size:11px}input[type=range]{padding:0}#zoomValue{text-align:center;font-size:11px;margin-bottom:8px}textarea{height:60px}button{padding:6px;background:#111;color:#eee;border:1px solid #666;cursor:pointer;font-size:12px}button:hover{background:#333}
</style>
</head>
<body>
<div class="app"><div class="header-panel"><div class="header-section"><h4>PIEZAS</h4><div class="header-section-content"><div class="piece-small">♘</div><div class="piece-small">♞</div></div></div><div class="header-section radios-section"><h4>RADIOS</h4><div id="radiusControls" class="radius-controls"><label><input type="checkbox" data-radius="1" checked> √1 / 1 — (1,0)</label><label><input type="checkbox" data-radius="2" checked> √2 — (1,1)</label><label><input type="checkbox" data-radius="4"> 2 — (2,0)</label><label><input type="checkbox" data-radius="5" checked> √5 — (2,1)</label><label><input type="checkbox" data-radius="8"> √8 — (2,2)</label><label><input type="checkbox" data-radius="9"> 3 — (3,0)</label><label><input type="checkbox" data-radius="10"> √10 — (3,1)</label><label><input type="checkbox" data-radius="13"> √13 — (3,2)</label><label><input type="checkbox" data-radius="18"> √18 — (3,3)</label><label><input type="checkbox" data-radius="16"> 4 — (4,0)</label><label><input type="checkbox" data-radius="17"> √17 — (4,1)</label><label><input type="checkbox" data-radius="20"> √20 — (4,2)</label></div></div><div class="header-section"><h4>VISTA</h4><div class="header-section-content rotation-buttons"><button id="rotBtn-90">-90°</button><button id="rotBtn0">0°</button><button id="rotBtn90">90°</button><button id="rotBtn180">180°</button></div></div></div><div class="content-area"><div class="board-container"><div id="board" class="board"></div></div><aside class="side-panel"><h3>CONTROLES</h3><label>Zoom (%)</label><input id="zoomInput" type="range" min="10" max="200" value="100"><div id="zoomValue">100%</div><label>Filas</label><input id="rowsInput" type="number" min="1" max="200" value="8"><label>Columnas</label><input id="colsInput" type="number" min="1" max="200" value="8"><label>Decimales</label><input id="decimalsInput" type="number" min="0" max="6" value="0"></aside><aside class="side-panel"><h3>DATOS</h3><label>Fila</label><input id="rowBox" readonly><label>Columna</label><input id="colBox" readonly><label>Piso</label><input id="floorBox" readonly><label>Radio</label><input value="múltiples" readonly style="font-size:10px"><label>Regla</label><input value="según radio" readonly style="font-size:10px"><label>Notas</label><textarea id="notesBox">Seleccioná radios para ver todas las casillas a esa distancia euclídea.</textarea></aside></div></div>
<script>
const boardEl=document.getElementById('board'),rowBox=document.getElementById('rowBox'),colBox=document.getElementById('colBox'),floorBox=document.getElementById('floorBox'),zoomInput=document.getElementById('zoomInput'),zoomValue=document.getElementById('zoomValue'),rowsInput=document.getElementById('rowsInput'),colsInput=document.getElementById('colsInput');let selected=null,rotation=0,rows=8,cols=8,baseSize=20,zoom=100;const cells=[];
function initializeCells(){for(let r=0;r<rows;r++){if(!cells[r])cells[r]=[];for(let c=0;c<cols;c++)cells[r][c]={row:r,col:c,el:null}}}function floorName(r,c){return(r+c)%2===0?'blanco':'negro'}function updateCellSize(){const size=Math.max(4,Math.round(baseSize*zoom/100));boardEl.style.gridTemplateColumns=`repeat(${cols},${size}px)`;boardEl.style.gridTemplateRows=`repeat(${rows},${size}px)`}function renderBoard(){boardEl.innerHTML='';let order=[];for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){let mr=r,mc=c;if(rotation===90){mr=c;mc=rows-1-r}else if(rotation===180){mr=rows-1-r;mc=cols-1-c}else if(rotation===270){mr=cols-1-c;mc=r}order.push([mr,mc])}for(const[r,c]of order){const cell=cells[r][c]||{row:r,col:c,el:null},el=document.createElement('div');el.className='cell '+(floorName(r,c)==='blanco'?'white':'black');const coord=document.createElement('div');coord.className='coord';coord.textContent=`${r},${c}`;el.appendChild(coord);el.addEventListener('click',()=>selectCell(r,c));cell.el=el;cells[r][c]=cell;boardEl.appendChild(el)}updateRadiusView()}function selectCell(r,c){selected=cells[r][c];rowBox.value=r;colBox.value=c;floorBox.value=floorName(r,c);updateRadiusView()}function activeRadiusSquares(){return[...document.querySelectorAll('#radiusControls input:checked')].map(x=>Number(x.dataset.radius))}function offsetsForRadius(n){const o=[],m=Math.ceil(Math.sqrt(n));for(let dr=-m;dr<=m;dr++)for(let dc=-m;dc<=m;dc++)if((dr||dc)&&dr*dr+dc*dc===n)o.push([dr,dc]);return o}function updateRadiusView(){for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const el=cells[r][c].el;if(!el)continue;el.classList.remove('selected','knightTarget','radiusTarget');el.innerHTML='';const coord=document.createElement('div');coord.className='coord';coord.textContent=`${r},${c}`;el.appendChild(coord)}if(!selected)return;const sr=selected.row,sc=selected.col;selected.el.classList.add('selected');selected.el.insertAdjacentHTML('afterbegin','♘');activeRadiusSquares().forEach(n=>offsetsForRadius(n).forEach(([dr,dc])=>{const r=sr+dr,c=sc+dc;if(r<0||r>=rows||c<0||c>=cols)return;const target=cells[r][c].el;target.classList.add(n===5?'knightTarget':'radiusTarget');target.insertAdjacentHTML('beforeend',`<div style="font-size:8px;color:#fff;font-weight:bold;position:absolute;top:2px;left:2px;background:rgba(0,0,0,.55);padding:1px 2px;border-radius:2px;">${n===1?'√1':`√${n}`}</div>`)}))}
zoomInput.addEventListener('input',e=>{zoom=+e.target.value;zoomValue.textContent=zoom+'%';updateCellSize();renderBoard()});rowsInput.addEventListener('change',e=>{rows=+e.target.value||8;selected=null;initializeCells();updateCellSize();renderBoard()});colsInput.addEventListener('change',e=>{cols=+e.target.value||8;selected=null;initializeCells();updateCellSize();renderBoard()});[['rotBtn-90',270],['rotBtn0',0],['rotBtn90',90],['rotBtn180',180]].forEach(([id,v])=>document.getElementById(id).addEventListener('click',()=>{rotation=v;renderBoard()}));document.querySelectorAll('#radiusControls input').forEach(x=>x.addEventListener('change',updateRadiusView));initializeCells();updateCellSize();renderBoard();
</script></body></html>
